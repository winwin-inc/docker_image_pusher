# pre-commit hooks
# https://pre-commit.com

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        name: ruff (format)
        types_or: [python]
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
        name: ruff-format (format)
        types_or: [python]
